<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background:#121212; color:white; }</style>
</head>
<body class="p-4">
    <nav class="mb-4"><a href="/" class="btn btn-primary">Canales</a> <a href="/admin_users" class="btn btn-secondary">Usuarios</a></nav>
    <h3>Agregar Canal</h3>
    <form action="/add_stream" method="POST" class="row g-2 mb-4">
        <div class="col-3"><input name="name" class="form-control" placeholder="Nombre"></div>
        <div class="col-7"><input name="url" class="form-control" placeholder="URL PelotaLibre"></div>
        <div class="col-2"><button class="btn btn-success w-100">Agregar</button></div>
    </form>
    <table class="table table-dark">
        {% for s in streams %}
        <tr><td>{{s.name}}</td><td><a href="/watch/{{s.id}}" class="btn btn-sm btn-info">Ver</a></td></tr>
        {% endfor %}
    </table>
</body>
</html>
