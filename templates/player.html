<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Multi-Fuente: {{ name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            font-family: sans-serif; 
        }
        #player { 
            width: 100%; 
            height: 70vh; 
            background-color: #111; 
        }
        .controls-panel { 
            background: #1a1a1a; 
            border-top: 1px solid #333; 
            padding: 20px; 
        }
        .btn-option {
            min-width: 120px;
        }
    </style>
</head>
<body>

    <div id="player"></div>

    <div class="controls-panel">
        <div class="container">
            <h2 class="mb-1">{{ name }}</h2>
            <p class="text-secondary mb-4">Si la imagen se corta o no carga, prueba con otra opción:</p>
            
            <div id="source-buttons" class="d-flex flex-wrap gap-2 mb-4">
                </div>

            <div class="mt-2">
                <a href="/" class="btn btn-outline-light btn-sm">← Volver al Panel</a>
            </div>
        </div>
    </div>

    <div id="data-helper" style="display:none;">{{ urls | tojson | safe }}</div>

    <script>
        // 1. Obtener las URLs de forma segura
        const helper = document.getElementById('data-helper');
        const sources = JSON.parse(helper.textContent);
        
        if (sources && sources.length > 0) {
            // 2. Inicializar el reproductor con la primera opción encontrada
            const player = new Clappr.Player({
                source: sources[0],
                parentId: "#player",
                autoPlay: true,
                width: '100%',
                height: '100%',
                hlsjsConfig: {
                    enableWorker: true
                }
            });

            // 3. Crear los botones para cada fuente encontrada
            const container = document.getElementById('source-buttons');
            
            sources.forEach((url, index) => {
                const btn = document.createElement('button');
                btn.className = "btn btn-outline-primary btn-option";
                btn.innerText = "Opción " + (index + 1);
                
                // Evento al hacer clic en el botón
                btn.onclick = function() {
                    console.log("Cambiando a fuente " + (index + 1) + ": " + url);
                    player.load(url);
                    player.play();
                    
                    // Resaltar el botón seleccionado
                    document.querySelectorAll('.btn-option').forEach(b => {
                        b.classList.replace('btn-success', 'btn-outline-primary');
                    });
                    btn.classList.replace('btn-outline-primary', 'btn-success');
                };
                
                container.appendChild(btn);
            });

            // Marcar el primer botón como activo por defecto
            if (container.firstChild) {
                container.firstChild.classList.replace('btn-outline-primary', 'btn-success');
            }

        } else {
            // Mensaje si no hay fuentes disponibles
            document.getElementById('player').innerHTML = `
                <div class="d-flex align-items-center justify-content-center h-100">
                    <div class="text-center">
                        <h4 class="text-danger">No se encontraron fuentes reproducibles</h4>
                        <p>Intenta recargar la página o verifica la URL de origen.</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
