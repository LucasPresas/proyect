<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Reproductor | {{ title }}</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: sans-serif; 
        }
        .nav-bar { 
            position: absolute; top: 0; width: 100%; height: 45px; 
            background: rgba(22, 27, 34, 0.95); z-index: 999; 
            display: flex; align-items: center; padding: 0 15px;
            border-bottom: 1px solid #30363d;
        }
        .back-btn { 
            color: #58a6ff; text-decoration: none; font-weight: bold; 
            font-size: 14px; display: flex; align-items: center; 
        }
        .back-btn:hover { color: #79c0ff; }
        .iframe-wrapper { 
            width: 100%; height: 100%; padding-top: 45px; 
            box-sizing: border-box; 
        }
        iframe { 
            width: 100%; height: 100%; border: none; 
            background: #000;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="/" class="back-btn">← VOLVER A LA AGENDA</a>
        <span style="color: #8b949e; margin-left: 15px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
            {{ title }}
        </span>
    </div>
    
    <div class="iframe-wrapper">
        <iframe 
            src="{{ stream_url }}" 
            allowfullscreen="true" 
            scrolling="no" 
            allow="encrypted-media; autoplay"
            referrerpolicy="no-referrer">
        </iframe>
    </div>
</body>
</html>
