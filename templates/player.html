<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        .container { position: relative; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.5); color: white; padding: 10px; text-decoration: none; border-radius: 5px; font-family: sans-serif; }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Volver</a>
    <div class="container">
        <iframe 
            src="{{ stream_url }}" 
            sandbox="allow-forms allow-scripts allow-same-origin" 
            allowfullscreen="true"
            scrolling="no">
        </iframe>
    </div>
</body>
</html>
