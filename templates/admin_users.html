<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - Xtream-Lite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .table { color: #e0e0e0; border-color: #444; }
        .navbar { border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Xtream-Lite Admin</a>
            <div class="d-flex">
                <a href="/" class="btn btn-sm btn-outline-info">Gestionar Canales</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Usuarios para Smarters / Player API</h2>

        <div class="card p-4 mb-5">
            <h5 class="text-info mb-3">Registrar Nuevo Cliente</h5>
            <form action="/add_user" method="POST" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label small">Nombre de Usuario</label>
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label small">Contraseña</label>
                    <input type="text" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Agregar</button>
                </div>
            </form>
        </div>

        <div class="card p-4">
            <h5 class="mb-3">Lista de Accesos Activos</h5>
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>{{ u['id'] }}</td>
                        <td><strong>{{ u['username'] }}</strong></td>
                        <td><code>{{ u['password'] }}</code></td>
                        <td><span class="badge bg-success">Activo</span></td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">No se han creado usuarios todavía.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
